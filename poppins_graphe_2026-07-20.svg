<svg width="1050" height="520" viewBox="0 0 1050 520" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Graphe causal REVIEW — POPPINS CLINICAL</title>
<desc>Vrai dossier PECAN, avis CNEDiMTS favorable du 23 juin 2026. Claim et données construites uniquement depuis le protocole POPPINS-02, jamais depuis l'avis HAS. Deux gaps réels : population (exclusions protocolaires non reflétées dans l'indication) et design (déséquilibre de groupes à l'inclusion). Comparateur, endpoints, biais de mesure, dispositif et contexte tous OK. Structure causale DIRECT.</desc>
