<svg width="1150" height="520" viewBox="0 0 1150 520" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Graphe causal REVIEW — POPPINS CLINICAL</title>
<desc>Vrai dossier PECAN, avis CNEDiMTS favorable du 23 juin 2026. Claim et données construites uniquement depuis le protocole POPPINS-02, jamais depuis l'avis HAS. Deux gaps réels : population (exclusions protocolaires non reflétées dans l'indication) et design (déséquilibre de groupes à l'inclusion). Comparateur, endpoints, biais de mesure, dispositif et contexte tous OK. Structure causale DIRECT. Rattachement mis à jour le 2026-07-21 : type de revendication, population et contexte dépendent de la revendication (ce qui est affirmé), pas de l'intervention ; seul le dispositif reste rattaché à l'intervention (fait sur le dispositif lui-même).</desc>
<style>
  .node rect { stroke-width: 0.5; }
  .c-gray rect { fill: #f3f4f1; stroke: #9aa08e; }
  .c-teal rect { fill: #eaf4f1; stroke: #2f7d6f; }
  .c-coral rect { fill: #fbeaea; stroke: #a13b3b; }
  .c-gray { color: #4a5040; }
  .c-teal { color: #1f6e4c; }
  .c-coral { color: #a13b3b; }
  .arr { stroke: #8a927e; }
  .th { font: 700 13px -apple-system, "Segoe UI", sans-serif; fill: #16233a; }
  .ts { font: 12px -apple-system, "Segoe UI", sans-serif; fill: #2c3a52; }
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8a927e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<rect width="1150" height="520" fill="#ffffff"/>

