<text class="th" x="640" y="382" text-anchor="middle" dominant-baseline="central">Conclusion</text>
<text class="ts" x="640" y="400" text-anchor="middle" dominant-baseline="central">Inférence causale directe</text>
</g>

<circle cx="60" cy="462" r="6" fill="#9aa08e"/>
<text class="ts" x="74" y="462" dominant-baseline="central">Revendication / structure</text>
<circle cx="290" cy="462" r="6" fill="#2f7d6f"/>
<text class="ts" x="304" y="462" dominant-baseline="central">OK</text>
<circle cx="360" cy="462" r="6" fill="#a13b3b"/>
<text class="ts" x="374" y="462" dominant-baseline="central">Gap identifié</text>

<text class="ts" x="60" y="490" fill="#6b7280">Population, Contexte et Type de revendication dépendent de la Revendication (ce qui est affirmé) — pas de l'Intervention.</text>
<text class="ts" x="60" y="506" fill="#6b7280">Seul Dispositif dépend de l'Intervention (fait sur le dispositif lui-même, indépendant de ce qui est revendiqué).</text>
</svg>
